<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Quiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container mt-5 mb-5">

<div class="card shadow-lg p-4">

<h2 class="text-center text-primary">

🧠 AI Quiz Mode

</h2>

<hr>

<div class="d-flex justify-content-between">

<h5>

Question

<span id="current-question">

1

</span>

/

<span id="total-question">

10

</span>

</h5>

<h5 id="score">

Score : 0

</h5>

</div>

<hr>

<h4 id="question-text">

Question will appear here...

</h4>

<div class="mt-4">

<div class="form-check mb-3">

<input class="form-check-input" type="radio" name="answer" id="option1">

<label class="form-check-label" for="option1" id="label1">

Option A

</label>

</div>

<div class="form-check mb-3">

<input class="form-check-input" type="radio" name="answer" id="option2">

<label class="form-check-label" for="option2" id="label2">

Option B

</label>

</div>

<div class="form-check mb-3">

<input class="form-check-input" type="radio" name="answer" id="option3">

<label class="form-check-label" for="option3" id="label3">

Option C

</label>

</div>

<div class="form-check mb-3">

<input class="form-check-input" type="radio" name="answer" id="option4">

<label class="form-check-label" for="option4" id="label4">

Option D

</label>

</div>

</div>

<div class="mt-4">

<button class="btn btn-success">

Submit Answer

</button>

<button class="btn btn-primary float-end">

Next →

</button>

</div>

</div>

</div>

</body>

</html>
